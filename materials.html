<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materials</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f5f7fa; }
.sidebar {
    height: 100vh;
    background: #0d6efd;
}
.sidebar a {
    color: white;
    display: block;
    padding: 12px;
    text-decoration: none;
}
.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-2 sidebar p-3 text-white">
    <h4>EMS</h4>
    <a href="dashboard.html">Dashboard</a>
    <a href="electricians.html">Electricians</a>
    <a href="jobs.html">Jobs</a>
    <a href="tasks.html">Tasks</a>
    <a href="materials.html">Materials</a>
    <a href="reports.html">Reports</a>
</div>

<!-- Content -->
<div class="col-md-10 p-4">

<h3>Materials Management</h3>

<button class="btn btn-primary mb-3" onclick="addMaterial()">Add Material</button>

<table class="table table-bordered shadow">
<thead class="table-dark">
<tr>
<th>Material</th>
<th>Quantity</th>
<th>Usage</th>
</tr>
</thead>

<tbody id="materialTable">
<tr>
<td>Cable</td>
<td>100m</td>
<td>Site A</td>
</tr>
</tbody>

</table>

</div>
</div>
</div>

<script>
function addMaterial(){
    let material = prompt("Material Name");
    let quantity = prompt("Quantity");
    let usage = prompt("Usage");

    if(!material || !quantity || !usage){
        alert("All fields required");
        return;
    }

    let row = `
    <tr>
        <td>${material}</td>
        <td>${quantity}</td>
        <td>${usage}</td>
    </tr>
    `;

    document.getElementById("materialTable").innerHTML += row;
}
</script>

</body>
</html>
