<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f5f7fa; }
.sidebar {
    height: 100vh;
    background: #0d6efd;
}
.sidebar a {
    color: white;
    display: block;
    padding: 12px;
    text-decoration: none;
}
.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-2 sidebar p-3 text-white">
    <h4>EMS</h4>
    <a href="dashboard.html">Dashboard</a>
    <a href="electricians.html">Electricians</a>
    <a href="jobs.html">Jobs</a>
    <a href="tasks.html">Tasks</a>
    <a href="materials.html">Materials</a>
    <a href="reports.html">Reports</a>
</div>

<!-- Content -->
<div class="col-md-10 p-4">

<h3>Task Tracking</h3>

<button class="btn btn-primary mb-3" onclick="addTask()">Add Task</button>

<table class="table table-bordered shadow">
<thead class="table-dark">
<tr>
<th>Task</th>
<th>Electrician</th>
<th>Status</th>
</tr>
</thead>

<tbody id="taskTable">
<tr>
<td>Install Switchboard</td>
<td>Ravi Kumar</td>
<td><span class="badge bg-warning">Pending</span></td>
</tr>
</tbody>

</table>

</div>
</div>
</div>

<script>
function addTask(){
    let task = prompt("Task Name");
    let electrician = prompt("Assigned Electrician");

    if(!task || !electrician){
        alert("All fields required");
        return;
    }

    let row = `
    <tr>
        <td>${task}</td>
        <td>${electrician}</td>
        <td><span class="badge bg-warning">Pending</span></td>
    </tr>
    `;

    document.getElementById("taskTable").innerHTML += row;
}
</script>

</body>
</html>
