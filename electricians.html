<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electricians</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f5f7fa; }
.sidebar {
    height: 100vh;
    background: #0d6efd;
}
.sidebar a {
    color: white;
    display: block;
    padding: 12px;
    text-decoration: none;
}
.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-md-2 sidebar p-3 text-white">
    <h4>EMS</h4>
    <a href="dashboard.html">Dashboard</a>
    <a href="electricians.html">Electricians</a>
    <a href="jobs.html">Jobs</a>
    <a href="tasks.html">Tasks</a>
    <a href="materials.html">Materials</a>
    <a href="reports.html">Reports</a>
</div>

<!-- Content -->
<div class="col-md-10 p-4">

<h3>Electrician Management</h3>

<button class="btn btn-primary mb-3" onclick="addElectrician()">Add Electrician</button>

<table class="table table-bordered shadow">
<thead class="table-dark">
<tr>
<th>Name</th>
<th>Phone</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tableBody">
<tr>
<td>Ravi Kumar</td>
<td>9876543210</td>
<td><span class="badge bg-success">Active</span></td>
<td>
<button class="btn btn-sm btn-warning">Edit</button>
<button class="btn btn-sm btn-danger">Delete</button>
</td>
</tr>
</tbody>

</table>

</div>
</div>
</div>

<script>
function addElectrician(){
    let name = prompt("Enter Name");
    let phone = prompt("Enter Phone");

    if(!name || !phone){
        alert("All fields required");
        return;
    }

    let row = `
    <tr>
        <td>${name}</td>
        <td>${phone}</td>
        <td><span class="badge bg-success">Active</span></td>
        <td>
            <button class="btn btn-sm btn-warning">Edit</button>
            <button class="btn btn-sm btn-danger">Delete</button>
        </td>
    </tr>
    `;

    document.getElementById("tableBody").innerHTML += row;
}
</script>

</body>
</html>
