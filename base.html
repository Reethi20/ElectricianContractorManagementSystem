{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>EMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<style>
    body {
        background-color: #f5f7fa;
    }

    .sidebar {
        height: 100vh;
        background: #111827;
        color: white;
    }

    .sidebar h4 {
        font-weight: bold;
        margin-bottom: 20px;
    }

    .sidebar a {
        display: block;
        padding: 10px;
        margin: 5px 0;
        color: #cbd5e1;
        text-decoration: none;
        border-radius: 8px;
        transition: 0.3s;
    }

    .sidebar a:hover {
        background: #1f2937;
        color: white;
    }

    .sidebar a.active {
        background: #2563eb;
        color: white;
    }

    .main-content {
        min-height: 100vh;
        background: #f9fafb;
    }

    .topbar {
        background: white;
        padding: 10px 20px;
        border-bottom: 1px solid #ddd;
    }
</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar p-3">

    <h4>⚡ EMS</h4>

    <a href="/dashboard/" class="{% if request.path == '/dashboard/' %}active{% endif %}">📊 Dashboard</a>
    <a href="/electricians/" class="{% if request.path == '/electricians/' %}active{% endif %}">⚡ Electricians</a>
    <a href="/jobs/" class="{% if request.path == '/jobs/' %}active{% endif %}">🛠 Jobs</a>
    <a href="/tasks/" class="{% if request.path == '/tasks/' %}active{% endif %}">📋 Tasks</a>
    <a href="/materials/" class="{% if request.path == '/materials/' %}active{% endif %}">📦 Materials</a>
    <a href="/reports/" class="{% if request.path == '/reports/' %}active{% endif %}">📈 Reports</a>
    <a href="/profile/" class="{% if request.path == '/profile/' %}active{% endif %}">👤 Profile</a>

    <hr>

    <a href="/logout/" class="text-danger">🚪 Logout</a>

</div>

<!-- MAIN CONTENT -->
<div class="col-md-10 main-content">

    <!-- TOP BAR -->
    <div class="topbar d-flex justify-content-between align-items-center">

        <h5 class="mb-0">Welcome 👋</h5>

        <span class="badge bg-primary">
            {{ request.session.role }}
        </span>

    </div>

    <div class="p-4">
        {% block content %}
        {% endblock %}
    </div>

</div>

</div>
</div>

</body>
</html>
