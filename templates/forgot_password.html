{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="container mt-5">
<div class="card p-4 col-md-4 mx-auto shadow">

<h3 class="text-center">Reset Password</h3>

<form method="POST">
{% csrf_token %}

<input name="email" type="email" class="form-control mb-3" placeholder="Enter Email" required>

<input name="password" type="password" class="form-control mb-3" placeholder="New Password" required>

<button class="btn btn-primary w-100">Reset Password</button>

{% if error %}
<p class="text-danger text-center mt-2">{{ error }}</p>
{% endif %}

</form>

<p class="text-center mt-3">
<a href="/login/">Back to Login</a>
</p>

</div>
</div>

</body>
</html>
