{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ECMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#2563eb;--navy:#0f172a;--bg:#f8fafc;--border:#e2e8f0;}
        body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;}
        .auth-shell{min-height:100vh;}
        .brand-panel{background:var(--navy);color:#fff;min-height:100vh;padding:48px;}
        .brand-logo{width:58px;height:58px;border-radius:14px;object-fit:cover;}
        .brand-mark{width:84px;height:84px;border-radius:22px;background:rgba(37,99,235,.18);display:flex;align-items:center;justify-content:center;color:#93c5fd;font-size:34px;}
        .auth-card{width:100%;max-width:450px;border:1px solid var(--border);border-radius:18px;box-shadow:0 20px 50px rgba(15,23,42,.10);}
        .form-control,.form-select{height:52px;border-radius:12px;border-color:#dbe3ef;}
        .form-control:focus,.form-select:focus{border-color:var(--primary);box-shadow:0 0 0 .2rem rgba(37,99,235,.12);}
        .btn{border-radius:12px;font-weight:700;padding:12px 18px;}
        .btn-primary{background:var(--primary);border-color:var(--primary);}
        .auth-link{color:var(--primary);font-weight:600;text-decoration:none;}
        .auth-link:hover{text-decoration:underline;}
        .password-rules{font-size:12px;}
        @media(max-width:991px){
            .brand-panel{display:none !important;}
            .auth-shell{min-height:100vh;padding:22px;}
        }
        @media(max-width:575px){
            .auth-card{border:none;box-shadow:none;background:transparent;}
            .auth-card .card-body{padding:0 !important;}
        }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0 auth-shell">
        <div class="col-lg-6 brand-panel d-flex align-items-center">
            <div class="mx-auto" style="max-width:520px;">
                <div class="d-flex align-items-center gap-3 mb-5">
                    <img src="{% static 'images/logo.png' %}" class="brand-logo" alt="ECMS">
                </div>
                <h1 class="fw-bold mb-3">Create Your ECMS Account</h1>
            </div>
        </div>
        <div class="col-lg-6 d-flex align-items-center justify-content-center p-4">
            <div class="card auth-card bg-white">
                <div class="card-body p-4 p-sm-5">
                    <div class="mb-4">
                        <h2 class="fw-bold mb-2">Create Account</h2>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Full Name
                            </label>
                            <input
                                name="name"
                                class="form-control"
                                placeholder="Enter your full name"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Phone Number
                            </label>
                            <input
                                name="phone"
                                class="form-control"
                                placeholder="Enter your phone number"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Email Address
                            </label>
                            <input
                                name="email"
                                type="email"
                                class="form-control"
                                placeholder="Enter your email address"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Account Type
                            </label>

                            <select
                                name="role"
                                class="form-select"
                                required>

                                <option value="">
                                    Select Account Type
                                </option>

                                <option value="Admin">
                                    Admin
                                </option>

                                <option value="Electrician">
                                    Electrician
                                </option>

                                <option value="Client">
                                    Client
                                </option>

                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Password
                            </label>

                            <input
                                name="password"
                                type="password"
                                class="form-control"
                                placeholder="Create password"
                                required
                                pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Confirm Password
                            </label>

                            <input
                                name="confirm_password"
                                type="password"
                                class="form-control"
                                placeholder="Confirm password"
                                required>
                        </div>

                        <button class="btn btn-primary w-100 py-3">

                            <i class="fa-solid fa-user-plus me-2"></i>

                            Create Account

                        </button>

                        <div class="text-center mt-4">

                            <p class="mb-0 text-muted">
                                Already have an account?
                                <a href="/login/" class="auth-link">
                                    Sign In
                                </a>
                            </p>

                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
