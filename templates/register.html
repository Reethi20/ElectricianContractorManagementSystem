{% load static %}
<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

body{
    background:#f3f4f6;
}

.register-card{
    border:none;
    border-radius:15px;
}

.register-icon{
    font-size:45px;
}

.form-control,
.form-select{
    border-radius:10px;
}

.btn{
    border-radius:10px;
}

.auth-link{
    text-decoration:none;
}

.auth-link:hover{
    text-decoration:underline;
}

.password-rules{
    font-size:13px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card register-card p-4 col-md-5 mx-auto shadow-sm">

<div class="text-center mb-4">

<div class="register-icon text-success mb-2">

<i class="fa-solid fa-user-plus"></i>

</div>

<h3 class="fw-bold">

Create Account

</h3>

<p class="text-muted mb-0">

Register to access the ECMS platform

</p>

</div>

<!-- ERROR -->

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<form method="POST">

{% csrf_token %}

<input name="name"
       class="form-control mb-3"
       placeholder="Full Name"
       required>

<input name="phone"
       class="form-control mb-3"
       placeholder="Phone Number"
       required>

<input name="email"
       type="email"
       class="form-control mb-3"
       placeholder="Email Address"
       required>

<select name="role"
        class="form-select mb-3"
        required>

<option value="" disabled selected>

Select Role

</option>

<option value="Admin">

Admin

</option>

<option value="Electrician">

Electrician

</option>

<option value="Client">

Client

</option>

</select>

<input name="password"
       type="password"
       class="form-control mb-2"
       placeholder="Password"
       required
       pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$"
       title="Password must contain uppercase, lowercase, number and special character">

<small class="text-muted password-rules">

Password must contain:
uppercase letter, lowercase letter,
number and special character.

</small>

<button class="btn btn-success w-100 mt-4">

<i class="fa-solid fa-user-check"></i>
Register

</button>

<p class="text-center mt-3 mb-0">

<a href="/login/"
   class="auth-link">

Already have an account?

</a>

</p>

</form>

</div>

</div>

</body>
</html>
