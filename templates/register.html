{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="container mt-5">
<div class="card p-4 col-md-5 mx-auto shadow">

<h3 class="text-center">Register</h3>

<!--  ERROR MESSAGE -->
{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<input name="name" class="form-control mb-2" placeholder="Name" required>

<input name="phone" class="form-control mb-2" placeholder="Phone" required>

<input name="email" type="email" class="form-control mb-2" placeholder="Email" required>

<select name="role" class="form-control mb-2">
    <option value="Admin">Admin</option>
    <option value="Electrician">Electrician</option>
</select>

<!-- PASSWORD FIELD -->
<input name="password" type="password" class="form-control mb-2"
       placeholder="Password"
       required
       pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$"
       title="Password must be at least 8 characters and include uppercase, lowercase, number, and special character">

<!-- ✅ PASSWORD RULE TEXT -->
<small class="text-muted">
    Password must be at least 8 characters and include:
    uppercase, lowercase, number, and special character.
</small>

<button class="btn btn-success w-100 mt-3">Register</button>

<p class="text-center mt-3">
<a href="/login/">Already have an account?</a>
</p>

</form>

</div>
</div>

</body>
</html>
