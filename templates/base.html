{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>EMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f5f7fa;
}

/* Sidebar */
.sidebar {
    height: 100vh;
    background: linear-gradient(to bottom, #0d6efd, #0b5ed7);
    color: white;
}

.sidebar h4 {
    margin-bottom: 20px;
}

/* Links */
.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    margin: 5px 0;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.2s;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}

/* Logout */
.sidebar .logout {
    margin-top: 20px;
    color: #ff4d4d;
    font-weight: bold;
}

/* Cards */
.card {
    border-radius: 12px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Main area */
.main {
    padding: 25px;
}
</style>

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-2 sidebar p-3">
    <h4> EMS</h4>

    <a href="/dashboard/">Dashboard</a>
    <a href="/electricians/">Electricians</a>
    <a href="/jobs/">Jobs</a>
    <a href="/tasks/">Tasks</a>
    <a href="/materials/">Materials</a>
    <a href="/reports/">Reports</a>
    <a href="/profile/">Profile</a>

    <a href="/logout/" class="logout">Logout</a>
</div>

<!-- MAIN -->
<div class="col-md-10 main">
    {% block content %}
    {% endblock %}
</div>

</div>
</div>

</body>
</html>
