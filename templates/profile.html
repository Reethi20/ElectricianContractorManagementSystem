{% extends 'base.html' %}

{% block content %}

<style>

.profile-card{
    border:none;
    border-radius:24px;
    overflow:hidden;
    background:white;
}

.profile-header{
    background:linear-gradient(135deg,#2563eb,#1e40af);
    padding:50px 30px;
    color:white;
}

.profile-avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    background:white;
    color:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    margin:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.profile-name{
    font-weight:700;
    margin-top:18px;
    margin-bottom:8px;
}

.profile-email{
    opacity:0.9;
    margin-bottom:0;
}

.info-box{
    background:#f8fafc;
    border-radius:18px;
    padding:22px;
    height:100%;
    border:1px solid #e5e7eb;
}

.info-label{
    font-size:14px;
    color:#64748b;
    margin-bottom:10px;
    font-weight:500;
}

.info-value{
    font-weight:700;
    color:#111827;
    font-size:22px;
    margin:0;
}

.role-badge{
    padding:10px 18px;
    border-radius:30px;
    font-size:14px;
    font-weight:600;
}

.profile-btn{
    padding:14px 20px;
    border-radius:14px;
    font-weight:600;
    font-size:15px;
}

</style>

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card profile-card shadow-sm">

                <!-- HEADER -->

                <div class="profile-header text-center">

                    <div class="profile-avatar">

                        <i class="fa-solid fa-user"></i>

                    </div>

                    <h2 class="profile-name">

                        {{ user.name }}

                    </h2>

                    <p class="profile-email">

                        {{ user.email }}

                    </p>

                </div>

                <!-- BODY -->

                <div class="card-body p-4">

                    <div class="row g-4">

                        <!-- PHONE -->

                        <div class="col-md-6">

                            <div class="info-box">

                                <p class="info-label">

                                    Phone Number

                                </p>

                                <h4 class="info-value">

                                    {{ user.phone }}

                                </h4>

                            </div>

                        </div>

                        <!-- ROLE -->

                        <div class="col-md-6">

                            <div class="info-box">

                                <p class="info-label">

                                    Account Role

                                </p>

                                {% if user.role == "Admin" %}

                                <span class="badge bg-primary role-badge">

                                    <i class="fa-solid fa-user-shield me-2"></i>

                                    Admin

                                </span>

                                {% elif user.role == "Electrician" %}

                                <span class="badge bg-success role-badge">

                                    <i class="fa-solid fa-bolt me-2"></i>

                                    Electrician

                                </span>

                                {% else %}

                                <span class="badge bg-warning text-dark role-badge">

                                    <i class="fa-solid fa-user me-2"></i>

                                    Client

                                </span>

                                {% endif %}

                            </div>

                        </div>

                    </div>

                    <!-- BUTTONS -->

                    <div class="row g-3 mt-4">

                        <!-- BACK -->

                        <div class="col-md-6">

                            <a href="/dashboard/"
                               class="btn btn-primary profile-btn w-100">

                                <i class="fa-solid fa-arrow-left me-2"></i>

                                Back to Dashboard

                            </a>

                        </div>

                        <!-- LOGOUT -->

                        <div class="col-md-6">

                            <a href="/logout/"
                               class="btn btn-outline-danger profile-btn w-100">

                                <i class="fa-solid fa-right-from-bracket me-2"></i>

                                Logout

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
