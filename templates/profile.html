{% extends 'base.html' %}

{% block content %}

<style>

.profile-card{
    border:none;
    border-radius:18px;
}

.profile-header{
    background:linear-gradient(135deg,#2563eb,#1e40af);
    border-radius:18px 18px 0 0;
    padding:40px 30px;
    color:white;
}

.profile-avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    background:white;
    color:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    margin:auto;
}

.info-box{
    background:#f8fafc;
    border-radius:12px;
    padding:15px;
}

.info-label{
    font-size:14px;
    color:#6b7280;
    margin-bottom:5px;
}

.info-value{
    font-weight:600;
    color:#111827;
    margin:0;
}

.role-badge{
    padding:8px 14px;
    border-radius:20px;
    font-size:13px;
}

</style>

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card profile-card shadow-sm">

                <!-- HEADER -->

                <div class="profile-header text-center">

                    <div class="profile-avatar mb-3">

                        <i class="fa-solid fa-user"></i>

                    </div>

                    <h2 class="fw-bold mb-1">

                        {{ user.name }}

                    </h2>

                    <p class="mb-0">

                        {{ user.email }}

                    </p>

                </div>

                <!-- BODY -->

                <div class="card-body p-4">

                    <div class="row g-4">

                        <!-- PHONE -->

                        <div class="col-md-6">

                            <div class="info-box">

                                <p class="info-label">

                                    Phone Number

                                </p>

                                <p class="info-value">

                                    {{ user.phone }}

                                </p>

                            </div>

                        </div>

                        <!-- ROLE -->

                        <div class="col-md-6">

                            <div class="info-box">

                                <p class="info-label">

                                    Account Role

                                </p>

                                <p class="mb-0">

                                    {% if user.role == "Admin" %}

                                    <span class="badge bg-primary role-badge">

                                        Admin

                                    </span>

                                    {% elif user.role == "Electrician" %}

                                    <span class="badge bg-success role-badge">

                                        Electrician

                                    </span>

                                    {% else %}

                                    <span class="badge bg-warning text-dark role-badge">

                                        Client

                                    </span>

                                    {% endif %}

                                </p>

                            </div>

                        </div>

                    </div>

                    <!-- BUTTONS -->

                    <div class="mt-4 d-flex gap-3 flex-wrap">

                        <a href="/dashboard/"
                           class="btn btn-primary">

                            <i class="fa-solid fa-arrow-left"></i>
                            Back to Dashboard

                        </a>

                        <a href="/logout/"
                           class="btn btn-outline-danger">

                            <i class="fa-solid fa-right-from-bracket"></i>
                            Logout

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
