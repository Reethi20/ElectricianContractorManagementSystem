{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ECMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#2563eb;--navy:#0f172a;--bg:#f8fafc;--border:#e2e8f0;}
        body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;}
        .auth-shell{min-height:100vh;}
        .brand-panel{background:var(--navy);color:#fff;min-height:100vh;padding:48px;}
        .brand-logo{width:58px;height:58px;border-radius:14px;object-fit:cover;}
        .brand-mark{width:84px;height:84px;border-radius:22px;background:rgba(37,99,235,.18);display:flex;align-items:center;justify-content:center;color:#93c5fd;font-size:34px;}
        .auth-card{width:100%;max-width:450px;border:1px solid var(--border);border-radius:18px;box-shadow:0 20px 50px rgba(15,23,42,.10);}
        .form-control{height:52px;border-radius:12px;border-color:#dbe3ef;}
        .form-control:focus{border-color:var(--primary);box-shadow:0 0 0 .2rem rgba(37,99,235,.12);}
        .btn{border-radius:12px;font-weight:700;padding:12px 18px;}
        .btn-primary{background:var(--primary);border-color:var(--primary);}
        .auth-link{color:var(--primary);font-weight:600;text-decoration:none;}
        .auth-link:hover{text-decoration:underline;}
        @media(max-width:991px){
            .brand-panel{display:none !important;}
            .auth-shell{min-height:100vh;padding:22px;}
        }
        @media(max-width:575px){
            .auth-card{border:none;box-shadow:none;background:transparent;}
            .auth-card .card-body{padding:0 !important;}
        }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0 auth-shell">
        <div class="col-lg-6 brand-panel d-flex align-items-center">
            <div class="mx-auto" style="max-width:520px;">
                <div class="d-flex align-items-center gap-3 mb-5">
                    <img src="{% static 'images/logo.png' %}" class="brand-logo" alt="ECMS">
                    <div>
                        <h4 class="fw-bold mb-0">ECMS</h4>
                        <p class="text-white-50 mb-0">Electrical Contractor Platform</p>
                    </div>
                </div>
                <div class="brand-mark mb-4"><i class="fa-solid fa-bolt"></i></div>
                <h1 class="fw-bold mb-3">Electrical Contractor Management System</h1>

            </div>
        </div>
        <div class="col-lg-6 d-flex align-items-center justify-content-center p-4">
            <div class="card auth-card bg-white">
                <div class="card-body p-4 p-sm-5">
                    <div class="mb-4">
                        <h2 class="fw-bold mb-2">Welcome Back</h2>
                        <p class="text-muted mb-0">Sign in to continue to your ECMS dashboard.</p>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter email address" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fa-solid fa-right-to-bracket me-2"></i>
                            Login
                        </button>
                        <div class="d-flex justify-content-between flex-wrap gap-2 mt-4">
                            <a href="/forgot-password/" class="auth-link">Forgot Password?</a>
                            <a href="/register/" class="auth-link">Create Account</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
