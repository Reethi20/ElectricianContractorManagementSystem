{% load static %}
<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

body{
    background:#f3f4f6;
}

.login-card{
    border:none;
    border-radius:15px;
}

.login-icon{
    font-size:45px;
}

.form-control{
    border-radius:10px;
}

.btn{
    border-radius:10px;
}

.auth-link{
    text-decoration:none;
}

.auth-link:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card login-card p-4 col-md-4 mx-auto shadow-sm">

<div class="text-center mb-4">

<div class="login-icon text-primary mb-2">

<i class="fa-solid fa-user-lock"></i>

</div>

<h3 class="fw-bold">
Login
</h3>

<p class="text-muted mb-0">

Sign in to continue to ECMS

</p>

</div>

<form method="POST">

{% csrf_token %}

<input name="email"
       type="email"
       class="form-control mb-3"
       placeholder="Email Address"
       required>

<input name="password"
       type="password"
       class="form-control mb-3"
       placeholder="Password"
       required>

<button class="btn btn-primary w-100">

<i class="fa-solid fa-right-to-bracket"></i>
Login

</button>

<p class="text-center mt-3 mb-2">

<a href="/forgot-password/"
   class="auth-link">

Forgot Password?

</a>

</p>

<p class="text-center mb-0">

<a href="/register/"
   class="auth-link">

Create Account

</a>

</p>

{% if error %}

<p class="text-danger text-center mt-3 mb-0">

{{ error }}

</p>

{% endif %}

</form>

</div>

</div>

</body>
</html>
